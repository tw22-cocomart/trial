<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<body style="font-family: Arial; background-color: #f4f4f4; padding: 40px;">

  <!-- Navbar: links change depending on login status -->
  <nav id="nav" aria-label="Main navigation" style="display:flex;justify-content:flex-end;gap:12px;padding:12px 20px;background:#f3f3f3;"></nav>

    <!-- Checkout box: shipping and payment -->
    <div style="max-width: 600px; margin: auto; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <h2>Secure Checkout</h2>
        <p style="color: #666;">Enter your shipping and payment details.</p>
        <hr style="margin-bottom: 30px;">

        <!-- Shipping form -->
        <form>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div style="display: flex; flex-direction: column;">
                    <label>First Name</label>
                    <input type="text" style="padding: 10px; margin-top: 5px;">
                </div>
                <div style="display: flex; flex-direction: column;">
                    <label>Last Name</label>
                    <input type="text" style="padding: 10px; margin-top: 5px;">
                </div>
                <div style="display: flex; flex-direction: column; grid-column: span 2;">
                    <label>Shipping Address</label>
                    <textarea style="padding: 10px; margin-top: 5px;" rows="3"></textarea>
                </div>
            </div>

            <h3 style="margin-top: 30px;">Payment Method</h3>
            <!-- payment options: user can pick one (visual only) -->
            <div style="display: flex; gap: 10px; margin-bottom: 30px;">
                <div style="border: 1px solid #ccc; padding: 10px; border-radius: 5px; flex: 1; text-align: center; cursor: pointer;">GCash</div>
                <div style="border: 1px solid #ccc; padding: 10px; border-radius: 5px; flex: 1; text-align: center; cursor: pointer;">Maya</div>
                <div style="border: 1px solid #ccc; padding: 10px; border-radius: 5px; flex: 1; text-align: center; cursor: pointer;">COD</div>
            </div>

            <!-- Place Order button: goes to confirmation page -->
            <button type="button" onclick="window.location.href='confirmation.html'" style="width: 100%; background: #28a745; color: white; border: none; padding: 15px; font-size: 1.1em; border-radius: 5px; cursor: pointer;">
                Place Order Now
            </button>
        </form>
    </div>

<!-- Navbar script: shows different links based on whether user is signed in -->
<script>
(function(){
  const nav = document.getElementById('nav');
  if (!nav) return;
  const stored = localStorage.getItem('cocomart_user');
  if (stored){
    nav.innerHTML = '<a href="products.html">Products</a> <a href="cart.html">Cart</a> <a href="profile.html">Profile</a> <a href="#" id="navLogout">Log out</a>';
    const btn = document.getElementById('navLogout');
    if (btn) btn.addEventListener('click', function(e){ e.preventDefault(); localStorage.removeItem('cocomart_user'); window.location.href='login.html'; });
  } else {
    nav.innerHTML = '<a href="products.html">Products</a> <a href="login.html">Login</a> <a href="signup.html">Sign Up</a>';
  }
})();
</script>

</body>
</html>
