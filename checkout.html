<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<body style="font-family: Arial; background-color: #f4f4f4; padding: 40px;">

    <div style="max-width: 600px; margin: auto; background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <h2>Secure Checkout</h2>
        <p style="color: #666;">Enter your shipping and payment details.</p>
        <hr style="margin-bottom: 30px;">

        <form>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div style="display: flex; flex-direction: column;">
                    <label>First Name</label>
                    <input type="text" style="padding: 10px; margin-top: 5px;">
                </div>
                <div style="display: flex; flex-direction: column;">
                    <label>Last Name</label>
                    <input type="text" style="padding: 10px; margin-top: 5px;">
                </div>
                <div style="display: flex; flex-direction: column; grid-column: span 2;">
                    <label>Shipping Address</label>
                    <textarea style="padding: 10px; margin-top: 5px;" rows="3"></textarea>
                </div>
            </div>

            <h3 style="margin-top: 30px;">Payment Method</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 30px;">
                <div style="border: 1px solid #ccc; padding: 10px; border-radius: 5px; flex: 1; text-align: center; cursor: pointer;">GCash</div>
                <div style="border: 1px solid #ccc; padding: 10px; border-radius: 5px; flex: 1; text-align: center; cursor: pointer;">Maya</div>
                <div style="border: 1px solid #ccc; padding: 10px; border-radius: 5px; flex: 1; text-align: center; cursor: pointer;">COD</div>
            </div>

            <button type="button" onclick="window.location.href='confirmation.html'" style="width: 100%; background: #28a745; color: white; border: none; padding: 15px; font-size: 1.1em; border-radius: 5px; cursor: pointer;">
                Place Order Now
            </button>
        </form>
    </div>

</body>
</html>
