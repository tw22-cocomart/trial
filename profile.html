<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cocomart — Profile</title>

<style>
html,body{height:100%;margin:0}
body{
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:system-ui;
}
.container{
  display:flex;
  flex-direction:column;
  gap:15px;
  width:100%;
  max-width:420px;
  padding:20px;
}
.card{
  display:grid;
  gap:8px;
}
.row{
  display:flex;
  justify-content:space-between;
}
.note{color:#666;font-size:0.95rem}

/* nav styling */
nav{display:flex;justify-content:flex-end;gap:10px;margin-bottom:6px}
nav a{color:inherit;text-decoration:none;font-weight:500}
</style>
</head>

<body>

  <!-- Navbar: links change depending on login status -->
  <nav id="nav" aria-label="Main navigation" style="padding:8px 12px;"></nav>

<div class="container">
  <h1>cocomart</h1>
  <h2>Profile</h2>

  <div class="card">
    <div class="row"><strong>Name:</strong><span id="name"></span></div>
    <div class="row"><strong>Address:</strong><span id="address"></span></div>
    <div class="row"><strong>Contact:</strong><span id="contact"></span></div>
    <div class="row"><strong>Email:</strong><span id="email"></span></div>
  </div>

  <!-- Page-level logout link (also available in navbar) -->
  <a href="#" id="logout">Log out</a>
  <p class="note">If you arrived here directly the fields may show "Not provided".</p>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const storedUser = JSON.parse(localStorage.getItem('cocomart_user') || 'null');

  // try to show info from URL first
  // if not found, use saved user info
  // if nothing exists show "Not provided"
  function showOrDefault(key){
    const p = params.get(key);
    if (p) return p;
    if (storedUser && storedUser[key]) return storedUser[key];
    // email fallback if storedUser has only email key
    if (key === 'email' && storedUser && storedUser.email) return storedUser.email;
    return "Not provided";
  }

  document.getElementById("name").textContent = showOrDefault("name");
  document.getElementById("address").textContent = showOrDefault("address");
  document.getElementById("contact").textContent = showOrDefault("contact");
  document.getElementById("email").textContent = showOrDefault("email");

  // page logout clears saved user and returns to login
  document.getElementById('logout').addEventListener('click', function(e){
    e.preventDefault();
    localStorage.removeItem('cocomart_user');
    window.location.href = 'login.html';
  });
</script>

<!-- Navbar script: shows different links based on whether user is signed in -->
<script>
(function(){
  const nav = document.getElementById('nav');
  if (!nav) return;
  const stored = localStorage.getItem('cocomart_user');
  if (stored){
    nav.innerHTML = '<a href="products.html">Products</a> <a href="cart.html">Cart</a> <a href="profile.html">Profile</a> <a href="#" id="navLogout">Log out</a>';
    const btn = document.getElementById('navLogout');
    if (btn) btn.addEventListener('click', function(e){ e.preventDefault(); localStorage.removeItem('cocomart_user'); window.location.href='login.html'; });
  } else {
    nav.innerHTML = '<a href="products.html">Products</a> <a href="login.html">Login</a> <a href="signup.html">Sign Up</a>';
  }
})();
</script>

</body>
</html>
