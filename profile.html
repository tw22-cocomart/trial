<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cocomart — Profile</title>

<style>
html,body{height:100%;margin:0}
body{
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:system-ui;
}
.container{
  display:flex;
  flex-direction:column;
  gap:15px;
  width:100%;
  max-width:420px;
  padding:20px;
}
.card{
  display:grid;
  gap:8px;
}
.row{
  display:flex;
  justify-content:space-between;
}
</style>
</head>

<body>

<div class="container">
  <h1>cocomart</h1>
  <h2>Profile</h2>

  <div class="card">
    <div class="row"><strong>Name:</strong><span id="name"></span></div>
    <div class="row"><strong>Address:</strong><span id="address"></span></div>
    <div class="row"><strong>Contact:</strong><span id="contact"></span></div>
    <div class="row"><strong>Email:</strong><span id="email"></span></div>
  </div>

  <a href="login.html">Log out</a>
</div>

<script>
  // This reads submitted form data
  const data = new FormData(document.forms[0] || document.createElement("form"));

  const params = new URLSearchParams(window.location.search);

  document.getElementById("name").textContent = params.get("name") || "Not provided";
  document.getElementById("address").textContent = params.get("address") || "Not provided";
  document.getElementById("contact").textContent = params.get("contact") || "Not provided";
  document.getElementById("email").textContent = params.get("email") || "Not provided";
</script>

</body>
</html>
