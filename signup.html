<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cocomart — Sign Up</title>

<style>
html,body{height:100%;margin:0}
body{
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:system-ui;
}
.container{
  display:flex;
  flex-direction:column;
  gap:15px;
  width:100%;
  max-width:380px;
  padding:20px;
}
form{
  display:grid;
  gap:10px;
}
input.invalid{outline:2px solid #e74c3c}
.error{color:#e74c3c;font-size:0.9rem;margin-top:-6px;margin-bottom:6px}
button{cursor:pointer}

/* small nav styles */
nav{display:flex;justify-content:flex-end;gap:10px;margin-bottom:6px}
nav a{color:inherit;text-decoration:none;font-weight:500}
</style>
</head>

<body>

<div class="container">
  <!-- NAV: will be rendered by JS -->
  <nav id="nav" aria-label="Main navigation"></nav>

  <h1>cocomart</h1>
  <p>Create your account</p>

  <!-- keep method/action out — we'll handle submission in JS -->
  <form id="signupForm" novalidate>
    <input id="name" name="name" type="text" placeholder="Full Name" required>
    <div id="nameError" class="error" aria-live="polite"></div>

    <input id="address" name="address" type="text" placeholder="Address" required>
    <div id="addressError" class="error" aria-live="polite"></div>

    <input id="contact" name="contact" type="text" placeholder="Contact Number" required>
    <div id="contactError" class="error" aria-live="polite"></div>

    <input id="email" name="email" type="email" placeholder="Email" required>
    <div id="emailError" class="error" aria-live="polite"></div>

    <input id="password" name="password" type="password" placeholder="Password" required>
    <div id="passwordError" class="error" aria-live="polite"></div>

    <button type="submit">Sign Up</button>
  </form>

  <p>Already registered? <a href="login.html">Login</a></p>
</div>

<script>
(function(){
  const form = document.getElementById('signupForm');
  const nameEl = document.getElementById('name');
  const addressEl = document.getElementById('address');
  const contactEl = document.getElementById('contact');
  const emailEl = document.getElementById('email');
  const passwordEl = document.getElementById('password');

  const nameErr = document.getElementById('nameError');
  const addrErr = document.getElementById('addressError');
  const contactErr = document.getElementById('contactError');
  const emailErr = document.getElementById('emailError');
  const passErr = document.getElementById('passwordError');

  // show red outline and error message
  function showError(el, msgEl, msg){
    el.classList.add('invalid');
    msgEl.textContent = msg;
  }

  // remove error styling when user starts typing
  function clearError(el, msgEl){
    el.classList.remove('invalid');
    msgEl.textContent = '';
  }

  // check if email format looks correct
  function validEmail(v){
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
  }

  // check if contact number has enough digits
  function validContact(v){
    // Allow digits, spaces, +, -, parentheses. Require at least 7 digits.
    const digits = v.replace(/\D/g,'');
    return digits.length >= 7 && /^[0-9+\-\s()]+$/.test(v);
  }

  nameEl.addEventListener('input', ()=> clearError(nameEl, nameErr));
  addressEl.addEventListener('input', ()=> clearError(addressEl, addrErr));
  contactEl.addEventListener('input', ()=> clearError(contactEl, contactErr));
  emailEl.addEventListener('input', ()=> clearError(emailEl, emailErr));
  passwordEl.addEventListener('input', ()=> clearError(passwordEl, passErr));

  // update the navbar depending on login status
  function renderNav(){
    const nav = document.getElementById('nav');
    const stored = localStorage.getItem('cocomart_user');
    if (stored){
      // if a user is already logged in
      // show Profile and Log out
      nav.innerHTML = `<a href="profile.html">Profile</a> <a href="#" id="logout">Log out</a>`;
      const logout = document.getElementById('logout');
      // remove saved user and go back to login page
      logout.addEventListener('click', function(e){
        e.preventDefault();
        localStorage.removeItem('cocomart_user');
        window.location.href = 'login.html';
      });
    } else {
      // not signed in -> show Login and Sign Up links
      nav.innerHTML = `<a href="login.html">Login</a> <a href="signup.html">Sign Up</a>`;
    }
  }
  renderNav();
  // --- end nav ---

  form.addEventListener('submit', function(e){
    e.preventDefault();
    let ok = true;

    if (!nameEl.value.trim()){
      showError(nameEl, nameErr, 'Full name is required.');
      ok = false;
    }

    if (!addressEl.value.trim()){
      showError(addressEl, addrErr, 'Address is required.');
      ok = false;
    }

    if (!contactEl.value.trim()){
      showError(contactEl, contactErr, 'Contact number is required.');
      ok = false;
    } else if (!validContact(contactEl.value.trim())){
      showError(contactEl, contactErr, 'Please enter a valid contact number.');
      ok = false;
    }

    if (!emailEl.value.trim()){
      showError(emailEl, emailErr, 'Email is required.');
      ok = false;
    } else if (!validEmail(emailEl.value.trim())){
      showError(emailEl, emailErr, 'Please enter a valid email.');
      ok = false;
    }

    if (!passwordEl.value){
      showError(passwordEl, passErr, 'Password is required.');
      ok = false;
    } else if (passwordEl.value.length < 6){
      showError(passwordEl, passErr, 'Password must be at least 6 characters.');
      ok = false;
    }

    if (!ok) return;

    // Build user object (do not store password)
    const userObj = {
      name: nameEl.value.trim(),
      address: addressEl.value.trim(),
      contact: contactEl.value.trim(),
      email: emailEl.value.trim()
    };

    // save user info so the site knows the user is logged in
    localStorage.setItem('cocomart_user', JSON.stringify(userObj));

    const params = new URLSearchParams({
      name: userObj.name,
      address: userObj.address,
      contact: userObj.contact,
      email: userObj.email
    }).toString();

    window.location.href = 'profile.html?' + params;
  });
})();
</script>

</body>
</html>
