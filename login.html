<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CocoMart</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Poppins"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- NAVIGATION -->
    <nav class="navbar">
      <div class="nav-left">
        <a href="index.html"
          ><img class="logo" src="images/cocomart-logo.png" alt="cocomart-logo"
        /></a>
        <a><h2>CocoMart</h2></a>
      </div>

      <div class="nav-center">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="products.html">Shop</a></li>
          <li><a href="about.html">About</a></li>
        </ul>
      </div>

      <div class="nav-right">
        <ul id="nav-right-list">
          <li>
            <a href="cart.html"
              ><img
                class="icon cart cart"
                src="images/icon-cart-line.png"
                alt="cart"
            /></a>
          </li>
          <li>
            <a href="profile.html"
              ><img
                class="icon profile profile"
                src="images/icon-profile-line.png"
                alt="profile"
            /></a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- MAIN -->
    <main class="main">
      <div class="log-container">
        <p>Log in</p>

        <form id="login-form" action="profile.html" method="post">
          <input name="email" type="email" placeholder="Email" required />
          <input
            name="password"
            type="password"
            placeholder="Password"
            required
          />
          <button type="submit">Log In</button>
        </form>

        <p>No account yet? <a href="signup.html">Create one</a></p>
      </div>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
      <div class="footer-left">
        <div class="fupper">
          <img
            class="f-logo"
            src="images/cocomart-logo.png"
            alt="Cocomart Logo"
          />
          <h2>CocoMart</h2>
        </div>
        <ul class="flower">
          <li>All rights reserved</li>
          <li>Terms of Service</li>
          <li>Privacy Policy</li>
        </ul>
      </div>

      <div class="footer-center">
        <ul class="footer-upper">
          <h2>Contact Us</h2>
          <li>+631234567890</li>
          <li>cocomart.tw22@gmail.com</li>
        </ul>
        <div class="icon-socials">
          <br />
          <a href="#"
            ><img
              class="icon icon-socials"
              src="images/icon-fb.png"
              alt="Facebook icon"
          /></a>
          <a href="#"
            ><img
              class="icon icon-socials"
              src="images/icon-insta.png"
              alt="Instagram icon"
          /></a>
          <a href="#"
            ><img
              class="icon icon-socials"
              src="images/icon-twt.png"
              alt="Twitter icon"
          /></a>
        </div>
      </div>

      <div class="footer-right disclaimer">
        For educational purposes only, and no copyright infringement is
        intended.
      </div>
    </footer>

    <!-- NAVBAR + SIMPLE LOGIN SCRIPT -->
    <script>
      // update navbar based on sign-in state (same logic as signup page)
      function updateNavbar() {
        const navList = document.getElementById("nav-right-list");
        const userJson = localStorage.getItem("cocomartUser");
        if (userJson) {
          navList.innerHTML = `
            <li><a href="cart.html"><img class="icon cart" src="images/icon-cart-line.png" alt="cart" /></a></li>
            <li><a href="profile.html"><img class="icon profile profile-active" src="images/icon-profile-line.png" alt="profile" /></a></li>
            <li><a id="nav-logout" href="#">Log out</a></li>
          `;
          document.getElementById("nav-logout").addEventListener("click", (e) => {
            e.preventDefault();
            localStorage.removeItem("cocomartUser");
            window.location.href = "index.html";
          });
        } else {
          navList.innerHTML = `
            <li><a href="cart.html"><img class="icon cart" src="images/icon-cart-line.png" alt="cart" /></a></li>
            <li><a href="login.html"><img class="icon profile" src="images/icon-profile-line.png" alt="profile" /></a></li>
            <li><a href="signup.html">Sign Up</a></li>
          `;
        }
      }
      updateNavbar();

      // Basic login behavior: we set a simple user object in localStorage
      // In a real app you'd validate credentials on the server.
      document.getElementById("login-form").addEventListener("submit", function (e) {
        e.preventDefault();
        const form = e.target;
        const formData = new FormData(form);
        const email = formData.get("email") || "Not provided";

        // Try to preserve existing signup info if present and email matches.
        const existing = localStorage.getItem("cocomartUser");
        let userObj = {
          name: "Not provided",
          address: "Not provided",
          contact: "Not provided",
          email: email
        };

        if (existing) {
          try {
            const parsed = JSON.parse(existing);
            // if emails match, keep more complete info
            if (parsed.email && parsed.email === email) {
              userObj = parsed;
            }
          } catch (err) {
            // fall back to minimal object
          }
        }

        localStorage.setItem("cocomartUser", JSON.stringify(userObj));
        window.location.href = "profile.html";
      });
    </script>
  </body>
</html>
